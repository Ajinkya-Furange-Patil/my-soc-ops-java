<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gray-50">
    <div class="max-w-md w-full">
        <!-- Hero Section -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">🎲 Soc Ops</h1>
            <p class="text-lg text-gray-600 font-medium">Social Bingo</p>
            <p class="text-sm text-gray-500 mt-2">Connect. Play. Win.</p>
        </div>

        <!-- How to Play Card -->
        <div class="card card-elevated mb-8">
            <div class="card-header">
                <h2 class="card-title">How to Play</h2>
            </div>
            <div class="text-left text-gray-700 space-y-3">
                <div class="flex gap-3">
                    <span class="badge badge-primary flex-shrink-0">1</span>
                    <p class="text-sm">Find people who match each question on the card</p>
                </div>
                <div class="flex gap-3">
                    <span class="badge badge-primary flex-shrink-0">2</span>
                    <p class="text-sm">Tap a square when you find a match to mark it</p>
                </div>
                <div class="flex gap-3">
                    <span class="badge badge-primary flex-shrink-0">3</span>
                    <p class="text-sm">Get 5 in a row (horizontal, vertical, or diagonal) to win!</p>
                </div>
            </div>
        </div>

        <!-- Features Overview -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="text-center">
                <div class="text-2xl mb-1">⚡</div>
                <p class="text-xs text-gray-600 font-medium">Fast</p>
            </div>
            <div class="text-center">
                <div class="text-2xl mb-1">😄</div>
                <p class="text-xs text-gray-600 font-medium">Fun</p>
            </div>
            <div class="text-center">
                <div class="text-2xl mb-1">🎯</div>
                <p class="text-xs text-gray-600 font-medium">Engaging</p>
            </div>
        </div>

        <!-- CTA Button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-primary btn-lg btn-block">
            Start Game
        </button>
    </div>
</div>
</div>
